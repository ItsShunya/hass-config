# commented out. It would be nice if the default_config: could have
# an exclude list, to stay in sync with the distributed defaults,
# but currently this is not possible.
#assist_pipeline:
backup:
#bluetooth:
config:
#conversation:
dhcp:
#energy:
#go2rtc:
#history:
homeassistant_alerts:
#cloud:
image_upload:
#logbook:
media_source:
mobile_app:
my:
ssdp:
stream:
sun:
#usage_prediction:
usb:
webhooks:
#zeroconf:


# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resource_mode: yaml
  resources:
    - url: /local/plugins/xiaomi-vacuum-map-card/xiaomi-vacuum-map-card.js
      type: module
    - url: /local/plugins/card-mod/card-mod.js
      type: module
  dashboards:
    lovelace-general:
      mode: yaml
      filename: dashboards/general/dashboard.yaml
      title: General
      icon: mdi:floor-plan
      show_in_sidebar: true
    lovelace-map:
      mode: yaml
      filename: dashboards/map/dashboard.yaml
      title: Map
      icon: mdi:map
      show_in_sidebar: true
    lovelace-clean:
      mode: yaml
      filename: dashboards/clean/dashboard.yaml
      title: Clean
      icon: mdi:broom
      show_in_sidebar: true

logger:
  default: info
  logs:
    custom_components.xiaomi_cloud_map_extractor: debug

# The home-assistant server lives behind a proxy.
http:
  server_port: 8123
  use_x_forwarded_for: true
  trusted_proxies:
    - ::1
    - 127.0.0.1
    - 10.9.97.0/24
  ip_ban_enabled: true
  login_attempts_threshold: 5

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
